<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Pro — ZR_Market</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="admin-container">
        <header class="admin-header">
            <h1><i class="fas fa-crown"></i> Admin Pro — ZR_Market</h1>
            <div>
                <span id="productsCount">0</span> product(s) live
                <button class="logout-btn" onclick="admin.logout()">Logout</button>
            </div>
        </header>

        <!-- GITHUB TOKEN -->
        <div class="admin-section" style="margin-bottom:20px;">
            <h2><i class="fas fa-key"></i> GitHub Connection</h2>
            <div id="tokenSection">Loading...</div>
        </div>

        <!-- ADD PRODUCT -->
        <div class="admin-section">
            <h2><i class="fas fa-plus-circle"></i> New Product</h2>
            <form id="productForm" class="admin-form" onsubmit="admin.addProduct(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Name <span class="required">*</span></label>
                        <input type="text" id="productName" placeholder="Ex: Wireless Earbuds Pro" required>
                    </div>
                    <div class="form-group">
                        <label>Price (€) <span class="required">*</span></label>
                        <input type="number" id="productPrice" step="0.01" placeholder="Ex: 29.99" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="productDesc" rows="3" placeholder="Describe your product..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Stock</label>
                        <input type="number" id="productStock" min="0" value="10">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="productCategory">
                            <option>Tech</option>
                            <option>Home Accessories</option>
                        </select>
                    </div>
                </div>

                <div class="media-section">
                    <h3><i class="fas fa-images"></i> Media (Photos + Video) — max 10</h3>
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-area" onclick="document.getElementById('mediaFiles').click()">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Click or drag & drop your photos/videos</p>
                            <small style="color:#aaa;">Max 50MB per file</small>
                            <input type="file" id="mediaFiles" multiple accept="image/*,video/*" style="display:none;">
                        </div>
                        <div class="preview-container" id="previewContainer"></div>
                    </div>
                </div>

                <button type="submit" class="admin-btn primary">
                    <i class="fas fa-rocket"></i> Publish Product
                </button>
            </form>
        </div>

        <!-- PRODUCTS LIST -->
        <div class="admin-section">
            <h2><i class="fas fa-list"></i> Live Products</h2>
            <div class="products-list" id="adminProductsList"></div>
        </div>

        <!-- ORDERS -->
        <div class="admin-section">
            <h2><i class="fas fa-receipt"></i> Recent Orders</h2>
            <div id="adminOrdersList"></div>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
